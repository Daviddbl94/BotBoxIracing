<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Box iRacing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060608;
    --bg2: #0d0d12;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #00b4ff;
    --accent2: #cc0000;
    --accent3: #ffffff;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --glow: rgba(0, 180, 255, 0.35);
    --glow2: rgba(204, 0, 0, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  /* GRID LINES */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,180,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 40px;
    background: rgba(6,6,8,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .nav-logo img {
    height: 36px;
    width: 36px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px var(--accent));
  }

  .nav-logo span {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--accent3);
  }

  .nav-logo span em {
    color: var(--accent);
    font-style: normal;
  }

  .lang-switcher {
    display: flex;
    gap: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
  }

  .lang-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .lang-btn.active {
    background: var(--accent);
    color: #000;
  }

  .lang-btn:hover:not(.active) {
    color: var(--text);
    background: var(--border);
  }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 40px 80px;
    overflow: hidden;
    z-index: 1;
  }

  .hero-glow-red {
    position: absolute;
    top: 20%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--glow2) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-glow-blue {
    position: absolute;
    bottom: 10%;
    left: -5%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner {
    max-width: 1100px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }

  .hero-content {
    animation: fadeUp 0.8s ease both;
  }

  .hero-eyebrow {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .hero-eyebrow::before {
    content: '';
    display: inline-block;
    width: 30px;
    height: 1px;
    background: var(--accent);
  }

  .hero-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 5vw, 62px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 24px;
  }

  .hero-title .line1 { color: var(--accent3); }
  .hero-title .line2 { 
    color: var(--accent);
    text-shadow: 0 0 40px var(--glow);
  }
  .hero-title .line3 { 
    color: var(--accent2);
    font-size: 0.6em;
    letter-spacing: 3px;
    font-weight: 600;
  }

  .hero-desc {
    font-size: 16px;
    line-height: 1.7;
    color: #9090a8;
    margin-bottom: 40px;
    max-width: 440px;
  }

  .hero-cta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #000;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 16px 32px;
    border-radius: 4px;
    text-decoration: none;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    border: none;
    cursor: pointer;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px var(--glow);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 15px 28px;
    border-radius: 4px;
    border: 1px solid var(--border);
    text-decoration: none;
    transition: all 0.25s;
    cursor: pointer;
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 20px rgba(0,180,255,0.1);
  }

  .hero-visual {
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeIn 1s ease both 0.3s;
    position: relative;
  }

  .logo-container {
    position: relative;
    width: 320px;
    height: 320px;
  }

  .logo-ring {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1px solid rgba(0,180,255,0.2);
    animation: spin 20s linear infinite;
  }

  .logo-ring::before {
    content: '';
    position: absolute;
    top: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
  }

  .logo-ring2 {
    position: absolute;
    inset: -50px;
    border-radius: 50%;
    border: 1px solid rgba(204,0,0,0.15);
    animation: spin 30s linear infinite reverse;
  }

  .logo-ring2::before {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent2);
  }

  .logo-glow-bg {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,180,255,0.08) 0%, transparent 70%);
  }

  .logo-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 30px rgba(0,180,255,0.4)) drop-shadow(0 0 60px rgba(0,180,255,0.15));
    animation: float 4s ease-in-out infinite;
  }

  /* STATS BAR */
  .stats-bar {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 28px 40px;
    overflow: hidden;
  }

  .stats-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    text-align: center;
  }

  .stat-item {
    padding: 0 20px;
    border-right: 1px solid var(--border);
  }

  .stat-item:last-child { border-right: none; }

  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* FEATURES */
  .section {
    position: relative;
    z-index: 1;
    padding: 100px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-header {
    margin-bottom: 60px;
  }

  .section-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-tag::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 2px;
    background: var(--accent2);
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 3vw, 38px);
    font-weight: 700;
    color: var(--accent3);
    line-height: 1.2;
  }

  .features-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .feature-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px 28px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .feature-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .feature-card:hover {
    border-color: rgba(0,180,255,0.3);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .feature-card:hover::before { opacity: 1; }

  .feature-icon {
    font-size: 28px;
    margin-bottom: 16px;
    display: block;
  }

  .feature-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent3);
    margin-bottom: 10px;
  }

  .feature-desc {
    font-size: 14px;
    line-height: 1.6;
    color: var(--muted);
  }

  /* COMMANDS */
  .commands-section {
    position: relative;
    z-index: 1;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 100px 40px;
  }

  .commands-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .commands-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 50px;
  }

  .cmd-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 16px;
    align-items: start;
    transition: border-color 0.2s;
  }

  .cmd-card:hover {
    border-color: rgba(0,180,255,0.25);
  }

  .cmd-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    white-space: nowrap;
    background: rgba(0,180,255,0.08);
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid rgba(0,180,255,0.2);
    align-self: center;
  }

  .cmd-info {}

  .cmd-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .cmd-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* DOWNLOAD */
  .download-section {
    position: relative;
    z-index: 1;
    padding: 100px 40px;
    max-width: 1100px;
    margin: 0 auto;
    text-align: center;
  }

  .download-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 60px 40px;
    position: relative;
    overflow: hidden;
  }

  .download-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,180,255,0.06) 0%, transparent 60%);
  }

  .download-box::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .download-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 900;
    color: var(--accent3);
    margin-bottom: 16px;
    position: relative;
  }

  .download-subtitle {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 40px;
    position: relative;
  }

  .download-btn-wrap {
    position: relative;
    display: inline-block;
  }

  .download-badge {
    position: absolute;
    top: -10px;
    right: -10px;
    background: var(--accent2);
    color: white;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    z-index: 1;
  }

  .download-meta {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  .meta-item .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    background: var(--bg);
    padding: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
  }

  .footer-brand {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .footer-brand span { color: var(--accent); }

  .footer-note {
    font-size: 13px;
    color: var(--muted);
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 14px 20px; }
    .hero { padding: 100px 20px 60px; }
    .hero-inner { grid-template-columns: 1fr; text-align: center; }
    .hero-eyebrow { justify-content: center; }
    .hero-desc { margin: 0 auto 40px; }
    .hero-cta { justify-content: center; }
    .hero-visual { order: -1; }
    .logo-container { width: 220px; height: 220px; }
    .stats-inner { grid-template-columns: 1fr; gap: 20px; }
    .stat-item { border-right: none; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
    .stat-item:last-child { border-bottom: none; }
    .features-grid { grid-template-columns: 1fr; }
    .commands-grid { grid-template-columns: 1fr; }
    .section { padding: 60px 20px; }
    .commands-section { padding: 60px 20px; }
    .download-section { padding: 60px 20px; }
    footer { padding: 30px 20px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <img id="nav-logo-img" src="" alt="Bot Box iRacing">
    <span>BOT BOX <em>iRACING</em></span>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('es')">ES</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-glow-red"></div>
  <div class="hero-glow-blue"></div>
  <div class="hero-inner">
    <div class="hero-content">
      <div class="hero-eyebrow" data-es="Telemetría en directo" data-en="Live Telemetry"></div>
      <h1 class="hero-title">
        <span class="line1">BOT BOX</span><br>
        <span class="line2">iRACING</span><br>
        <span class="line3" data-es="BOT PARA TWITCH" data-en="TWITCH BOT"></span>
      </h1>
      <p class="hero-desc" 
         data-es="Conecta tu stream de iRacing con tu chat de Twitch. Tu comunidad puede consultar telemetría en tiempo real: combustible, tiempos, temperatura, circuito y más."
         data-en="Connect your iRacing stream to your Twitch chat. Your community can query live telemetry data: fuel, lap times, temperature, circuit info and more.">
      </p>
      <div class="hero-cta">
        <a href="#download" class="btn-primary" data-es="⬇ DESCARGAR GRATIS" data-en="⬇ FREE DOWNLOAD"></a>
        <a href="#commands" class="btn-secondary" data-es="VER COMANDOS" data-en="SEE COMMANDS"></a>
      </div>
    </div>
    <div class="hero-visual">
      <div class="logo-container">
        <div class="logo-ring"></div>
        <div class="logo-ring2"></div>
        <div class="logo-glow-bg"></div>
        <img id="hero-logo-img" class="logo-img" src="" alt="Bot Box iRacing">
      </div>
    </div>
  </div>
</section>



<!-- FEATURES -->
<section class="section">
  <div class="section-header">
    <div class="section-tag" data-es="Características" data-en="Features"></div>
    <h2 class="section-title" data-es="Todo lo que necesitas para tu pit lane digital" data-en="Everything you need for your digital pit lane"></h2>
  </div>
  <div class="features-grid">
    <div class="feature-card">
      <span class="feature-icon">📡</span>
      <div class="feature-title" data-es="TELEMETRÍA EN VIVO" data-en="LIVE TELEMETRY"></div>
      <p class="feature-desc" data-es="Lee datos directamente del SDK de iRacing. Combustible, RPM, velocidad, temperatura y más en tiempo real." data-en="Reads data directly from the iRacing SDK. Fuel, RPM, speed, temperature and more in real time."></p>
    </div>
    <div class="feature-card">
      <span class="feature-icon">💬</span>
      <div class="feature-title" data-es="INTEGRACIÓN TWITCH" data-en="TWITCH INTEGRATION"></div>
      <p class="feature-desc" data-es="Se conecta a tu canal con tu propia cuenta. Los espectadores hacen preguntas y el bot responde automáticamente." data-en="Connects to your channel using your own account. Viewers ask questions and the bot replies automatically."></p>
    </div>
    <div class="feature-card">
      <span class="feature-icon">🌍</span>
      <div class="feature-title" data-es="BILINGÜE ES/EN" data-en="BILINGUAL ES/EN"></div>
      <p class="feature-desc" data-es="Todos los comandos funcionan en español e inglés. Configura el idioma de respuesta desde la app." data-en="All commands work in both Spanish and English. Set the response language from the app settings."></p>
    </div>
  </div>
</section>

<!-- COMMANDS -->
<div class="commands-section" id="commands">
  <div class="commands-inner">
    <div class="section-header">
      <div class="section-tag" data-es="Comandos" data-en="Commands"></div>
      <h2 class="section-title" data-es="Algunos datos que puede consultar tu chat" data-en="Some information your chat can access"></h2>
    </div>
    <div class="commands-grid">

      <div class="cmd-card">
        <span class="cmd-name" data-es="!ayuda" data-en="!help"></span>
        <div class="cmd-info">
          <div class="cmd-title" data-es="Lista de comandos" data-en="Command list"></div>
          <div class="cmd-desc" data-es="Muestra todos los comandos disponibles en el chat" data-en="Shows all available commands in chat"></div>
        </div>
      </div>
      <div class="cmd-card">
        <span class="cmd-name" data-es="!combustible" data-en="!fuel"></span>

  const logoSrc = 'data:image/png;base64,' + LOGO_B64;

  // Language system
  let currentLang = 'es';

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
    document.documentElement.lang = lang;

    document.querySelectorAll('[data-es]').forEach(el => {
      const text = el.getAttribute('data-' + lang);
      if (text) {
        if (el.tagName === 'A' || el.tagName === 'BUTTON') {
          el.textContent = text;
        } else if (el.innerHTML.includes('<br>')) {
          el.innerHTML = text;
        } else {
          el.textContent = text;
        }
      }
    });
  }

  // Init
  setLang('es');
